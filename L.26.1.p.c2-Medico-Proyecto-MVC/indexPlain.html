<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clínica - HTML Plano</title>
    <style>
        .container { max-width: 800px; margin: auto; padding: 1rem; }
        button { margin-right: 0.5rem; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .alert-info { background-color: #e3f2fd; padding: 0.75rem; margin: 1rem 0; }
        .alert-secondary { background-color: #f8f9fa; padding: 0.75rem; margin: 1rem 0; }
        .alert-success { background-color: #d4edda; padding: 0.75rem; margin: 1rem 0; }
        .form-group { margin-bottom: 0.75rem; }
        .form-group label { display: inline-block; width: 180px; }
        .error { color: red; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div id="app-plain" class="container">
        <h2>Gestión de Atención Médica (HTML Plano)</h2>
        <button id="clinica_btnNuevoPaciente">Nuevo Paciente</button>
        <hr>
        <div class="alert-info">
            <strong>Total recaudado:</strong> $<span id="clinica_lblTotal">0.00</span>
        </div>
        <div class="alert-secondary">
            <strong>Cantidad por atención:</strong><br>
            Procedimiento: <span id="clinica_cantProc">0</span><br>
            Consulta: <span id="clinica_cantCons">0</span><br>
            Control: <span id="clinica_cantCtrl">0</span>
        </div>
        <div class="alert-success">
            <strong>Porcentajes:</strong><br>
            Procedimiento: <span id="clinica_porcProc">0%</span><br>
            Consulta: <span id="clinica_porcCons">0%</span><br>
            Control: <span id="clinica_porcCtrl">0%</span><br>
            Descuento aplicado: <span id="clinica_porcDesc">0%</span><br>
            <strong>Promedio de peso:</strong> <span id="clinica_lblPromPeso">0.0</span> kg
        </div>

        <h4>Listado de pacientes</h4>
        <table border="1" width="100%">
            <thead>
                <tr><th>Nombre</th><th>Apellido</th><th>Tipo</th><th>Pago</th></tr>
            </thead>
            <tbody id="tabla-pacientes-body"></tbody>
        </table>

        <div id="form-paciente" hidden>
            <h5>Registrar Paciente</h5>
            <div class="form-group"><label>Nombre:</label><input type="text" id="paciente_nombre"></div>
            <div class="form-group"><label>Apellido:</label><input type="text" id="paciente_apellido"></div>
            <div class="form-group"><label>Cédula:</label><input type="text" id="paciente_cedula"></div>
            <div class="form-group"><label>Sexo (M/F):</label><input type="text" id="paciente_sexo" maxlength="1"></div>
            <div class="form-group"><label>Fecha Nac (aaaa-mm-dd):</label><input type="date" id="paciente_fechaNac"></div>
            <div class="form-group"><label>Peso (kg):</label><input type="number" id="paciente_peso" step="0.1"></div>
            <div class="form-group"><label>Tipo Atención (1,2,3):</label><input type="number" id="paciente_tipo" min="1" max="3"></div>
            <div id="mensaje" class="error"></div>
            <div style="margin-top: 1rem;">
                <button id="paciente_btnCancelar">Cancelar</button>
                <button id="paciente_btnAceptar">Aceptar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import Cl_cClinica from "./dist/controllers/Cl_cClinica.js";
        import Cl_vClinicaPlain from "./dist/views/Cl_vClinicaPlain.js";
        import Cl_vPacientePlain from "./dist/views/Cl_vPacientePlain.js";

        const vistaClinica = new Cl_vClinicaPlain();
        const vistaPaciente = new Cl_vPacientePlain();
        new Cl_cClinica(vistaClinica, vistaPaciente);
    </script>
</body>
</html>
